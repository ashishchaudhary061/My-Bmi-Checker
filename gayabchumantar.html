<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gayab kro saare name par heading nahi</title>
</head>
<body>
    <ul id="names">

        <h1>Names</h1>
        

        <li>ashish chaudhary</li> 
        <li>namu </li> 
        <li>ashu</li> 
        <li>namarata chaudhary</li> 
    </ul>
</body>

<script>
    document.querySelector('#names').addEventListener('click' , function(e){
         if(e.target.tagName === 'LI'){
            let removeIt = e.target
            removeIt.remove()
        }
    })
</script>
</html>
