<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    * {
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        color: #333;
    }

    #wrapper {
        background: #ffffff;
        padding: 30px 40px;
        width: 350px;
        border-radius: 12px;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
    }

    h1 {
        margin-top: 0;
        color: #5a67d8;
    }

    p {
        margin: 8px 0;
    }

    form {
        margin-top: 20px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
    }

    #guessfield {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
        margin-bottom: 15px;
    }

    #guessfield:focus {
        border-color: #5a67d8;
    }

    #subt {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        background: #5a67d8;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.3s ease;
    }

    #subt:hover {
        background: #434190;
    }

    #subt:disabled {
        background: #aaa;
        cursor: not-allowed;
    }

    .resultParas {
        margin-top: 20px;
        text-align: left;
    }

    .guesses {
        font-weight: bold;
        color: #2d3748;
    }

    .lastResults {
        font-weight: bold;
        color: #e53e3e;
    }

    .lowOrHi h2 {
        margin-top: 15px;
        text-align: center;
        color: #38a169;
    }

    .button {
        margin-top: 20px;
        text-align: center;
        cursor: pointer;
    }

    #newGame {
        background: #38a169;
        color: white;
        padding: 10px;
        border-radius: 6px;
        transition: background 0.3s ease;
    }

    #newGame:hover {
        background: #2f855a;
    }
</style>

</head>
<body>
    <div id="wrapper">
        <h1>Number Guessing Game</h1>
        <p>try and guess a number between 1 and 100</p>
        <p>you have 10 attemps to guess the right number</p>
        <br>

        <form action="">
            <label for="" id="guess">Guess a Number</label>
            <input type="text" id="guessfield">
            <input type="submit" id="subt"  value="Submit Guess">
        </form>

        <div class="resultParas">
            <p>previous guesses : <span class="guesses"></span></p>
            <p>remaining guesses : <span class="lastResults">10</span></p>
            <p class="lowOrHi"></p>  <!--used to tell value is low or high-->
        </div>
    </div>
</body>

<script>
    let randomNumber = parseInt(Math.random() * 100 + 1);

    const submit = document.querySelector('#subt');
    const userInput = document.querySelector('#guessfield');
    const prevGuessSlot = document.querySelector('.guesses');
    const remaining = document.querySelector('.lastResults');
    const lowOrHi = document.querySelector('.lowOrHi');
    const startOver = document.querySelector('.resultParas');


    const p = document.createElement('p')

    let prevguess = [];
    let numguess = 1 ;
    let playGame = true;

    if(playGame){
        submit.addEventListener("click" , function(e){
            e.preventDefault();
            const guess = parseInt(userInput.value);

            validateGuess(guess);
        })
    }


    function validateGuess(guess){
        if(isNaN(guess)){
            alert('please enter a valid number')
        }
        else if ( guess < 1){
            alert('please enter a number equal or greater than 1 ')
        }
        else if (guess > 100){
            alert('please enter a number equal or less than 100')
        }
        else{
            prevguess.push(guess)
           

            if(numguess === 10 ){
                displayGuess(guess)
                displayMessage(`gameOver. Random number was ${randomNumber}`)
                endGame()
            }
            else{
                displayGuess(guess)
                checkGuess(guess)
            }
        }

    }

    function checkGuess(guess){
        if(guess === randomNumber){
            displayMessage(`you guessed it right`)
            endGame()
        }
        else if (guess < randomNumber){
            displayMessage(`the number you guessed is low`)
        }
        else if (guess > randomNumber){
            displayMessage(`the number you guessed is high`)
        }

    }

    function displayGuess(guess){      // clear the guess and update
        userInput.value = ''
        prevGuessSlot.innerHTML += `${guess}  `
       
        remaining.innerHTML = `${10 - numguess}`;
          numguess++;

    }

    function displayMessage(message){
        lowOrHi.innerHTML = `<h2>${message}</h2>`

    }

    function endGame(){
        userInput.value=''
        userInput.setAttribute('disabled' , '');
        p.classList.add('button');
        p.innerHTML = `<h2 id="newGame">Start new Game</h2>`;
        startOver.appendChild(p);
        playGame=false;
        newGame();

    }

    function newGame(){
        const newGameButton = document.querySelector('#newGame');
        newGameButton.addEventListener('click' , function(e){
            randomNumber = parseInt(Math.random() * 100 + 1);
            prevguess =[];
            numguess = 1;
            prevGuessSlot.innerHTML = '';
            remaining.innerHTML = 10;
            userInput.removeAttribute('disabled');
            startOver.removeChild(p);

            playGame = true ;

        })

    }

</script>


</html>
