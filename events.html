        <li id="dog">dog ko click kro</li>

<script>
    //false  - ( event bubbling) is a part of propogation & it is also default behavior  and Event child se parent ki taraf jata hai mtlb pehle child ka alert ayega phir parent ka 

    // document.querySelector('#animals').addEventListener('click' , function(e){

   // true - (event capturing) is also a part of propogation & Event parent se child ki taraf jata hai
    // document.querySelector('#animals').addEventListener('click' , function(e){
    //    alert("animal is clicked");
    // } , true)

    // document.querySelector('#owl').addEventListener('click' , function(e){
    //     alert("owl is clicked");
    // } , true)


    // stop propogation - y bubbling yaa capturing ko rok deta hai jese bubbling m sirf child ka alert ayega  or caputuring m sirf parent ka

    document.querySelector('#animals').addEventListener('click' , function(e){
       alert("animal is clicked");
    } , false)

    document.querySelector('#owl').addEventListener('click' , function(e){
        alert("owl is clicked");
        e.stopPropagation();

    } , false)
